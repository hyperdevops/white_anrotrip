<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Белый фон -->
  <circle cx="50" cy="50" r="50" fill="white"/>
  <!-- Пунктирный круг -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#cccccc" stroke-width="1.5"
    stroke-dasharray="4 3" stroke-linecap="round"/>
  <!-- Самолётик (верхний левый) -->
  <g transform="translate(18,18) rotate(-35,8,8) scale(0.7)">
    <path d="M2 8 L14 4 L16 8 L10 10 L10 14 L7 13 L7 10 Z" fill="#00abb3"/>
    <path d="M10 10 L14 12 L13 14 Z" fill="#00abb3"/>
  </g>
  <!-- ANRO — жирный тёмный -->
  <text x="50" y="52" font-family="Montserrat, Arial, sans-serif" font-size="18"
    font-weight="800" fill="#1a1a1a" text-anchor="middle" letter-spacing="1">ANRO</text>
  <!-- trip — курсив бирюзовый -->
  <text x="53" y="64" font-family="Georgia, serif" font-size="13"
    font-style="italic" fill="#00abb3" text-anchor="middle">trip</text>
</svg>
